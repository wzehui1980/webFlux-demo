spring:
  application:
    name: testWebFlux
  
  # H2 Database Configuration (R2DBC)
  r2dbc:
    url: r2dbc:h2:mem:///testdb
    username: sa
    password:
  
  # H2 Console Configuration (独立端口)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  # R2DBC Schema 初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
